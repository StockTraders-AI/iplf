<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liên hệ - iPlatform X</title>
    <meta name="description" content="Gửi yêu cầu liên hệ đến iPlatform X." />
    <link rel="icon" type="image/png" href="./images/large-logo.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="contact-page">
      <header class="legal-hero">
        <div class="container legal-hero-inner">
          <a class="logo-link legal-logo" href="./index.html" aria-label="iPlatform">
            <img src="./images/large-logo.png" alt="iPlatform" />
          </a>
          <a class="legal-back-link" href="./index.html">Trang chủ</a>
        </div>
      </header>

      <section class="container contact-shell">
        <div class="contact-copy">
          <p class="legal-kicker">iPlatform X</p>
          <h1>Liên hệ</h1>
          <p>Gửi thông tin của bạn, đội ngũ iPlatform X sẽ tiếp nhận và phản hồi trong thời gian sớm nhất.</p>
        </div>

        <form class="contact-form" id="contactForm">
          <div class="form-field">
            <label for="fullName">Họ và tên</label>
            <input id="fullName" name="fullName" type="text" autocomplete="name" required />
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="form-field">
            <label for="message">Nội dung</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button class="contact-submit" type="submit">Submit</button>
          <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script>
      const contactForm = document.getElementById("contactForm");
      const formStatus = document.getElementById("formStatus");
      const submitButton = contactForm.querySelector("button[type='submit']");

      contactForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          fullName: contactForm.fullName.value.trim(),
          email: contactForm.email.value.trim(),
          message: contactForm.message.value.trim(),
        };

        formStatus.className = "form-status";
        formStatus.textContent = "Đang gửi...";
        submitButton.disabled = true;

        try {
          const response = await fetch("https://api.iplatform.vn/api/contact-us", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          contactForm.reset();
          formStatus.className = "form-status success";
          formStatus.textContent = "Thông tin đã được gửi thành công.";
        } catch (error) {
          formStatus.className = "form-status error";
          formStatus.textContent = "Không gửi được thông tin. Vui lòng thử lại sau.";
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
